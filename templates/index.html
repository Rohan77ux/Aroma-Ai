<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aroma AI</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- Marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Favicon placeholder -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ──────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <!-- Leaf/flower icon -->
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="14" fill="#10a37f"/>
        <text x="7" y="20" font-size="16" fill="white">🌸</text>
      </svg>
      Aroma AI
    </div>

    <button class="btn-new-chat" id="newChatBtn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 1a.75.75 0 0 1 .75.75v5.5h5.5a.75.75 0 0 1 0 1.5h-5.5v5.5a.75.75 0 0 1-1.5 0v-5.5H1.75a.75.75 0 0 1 0-1.5h5.5V1.75A.75.75 0 0 1 8 1Z"/>
      </svg>
      New chat
    </button>

    <p class="sidebar-section-label">Features</p>
    <ul class="sidebar-links">
      <li>
        <a href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2Zm1 14.5h-2v-6h2v6Zm0-8h-2V6h2v2.5Z"/>
          </svg>
          Text Chat
        </a>
      </li>
      <li>
        <a href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2Z"/>
          </svg>
          Voice Input
        </a>
      </li>
      <li>
        <a href="#">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm4 18H6V4h7v5h5v11Z"/>
          </svg>
          PDF Q&amp;A
        </a>
      </li>
    </ul>
  </aside>

  <!-- ── Main chat area ────────────────────────────────────────────── -->
  <main class="chat-area">

    <!-- Header -->
    <header class="chat-header">
      <span class="chat-header-title">Aroma AI</span>
      <span class="model-badge">GPT-4o mini</span>
    </header>

    <!-- Messages -->
    <div class="messages-wrapper" id="messagesWrapper">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <h2>🌸 Aroma AI</h2>
        <p>Your intelligent assistant — chat, ask about documents, or talk to me with your voice.</p>
        <div class="suggestion-chips">
          <button class="chip">Explain quantum computing</button>
          <button class="chip">Write a Python function</button>
          <button class="chip">Summarize a topic</button>
          <button class="chip">Help me brainstorm</button>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <!-- PDF status bar -->
      <div class="pdf-status" id="pdfStatus" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm4 18H6V4h7v5h5v11Z"/>
        </svg>
        <span id="pdfFilename"></span>
        <button class="remove-pdf" id="removePdfBtn" title="Remove PDF">✕</button>
      </div>

      <div class="input-box">
        <!-- PDF upload -->
        <input type="file" id="pdfInput" accept=".pdf" style="display:none;" />
        <button class="icon-btn" id="pdfBtn" title="Upload PDF">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </button>

        <!-- Text input -->
        <textarea
          id="messageInput"
          rows="1"
          placeholder="Message Aroma AI…"
          autocomplete="off"
          spellcheck="true"
        ></textarea>

        <!-- Voice input -->
        <button class="icon-btn" id="voiceBtn" title="Voice input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

        <!-- Send -->
        <button class="icon-btn send-btn" id="sendBtn" title="Send message" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <p class="input-hint">Aroma AI can make mistakes. Verify important information.</p>
    </div>
  </main>

</div>

<script src="/static/js/main.js"></script>
</body>
</html>
